services:
  - type: web
    name: aerovista-analytics
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PUBLIC_SITE_URL
        value: https://aerovistaanalytics.com
      - key: ALLOWED_HOSTS
        value: aerovistaanalytics.com,www.aerovistaanalytics.com,aerovista-analytics.onrender.com
      - key: PUBLIC_CONTACT_EMAIL
        value: contact@aerovistaanalytics.com
      - key: CONTACT_TO_EMAIL
        value: contact@aerovistaanalytics.com
      - key: CONTACT_FROM_EMAIL
        value: "AeroVista Analytics <contact@aerovistaanalytics.com>"
      - key: RESEND_API_KEY
        sync: false
      - key: CSRF_SECRET
        generateValue: true
